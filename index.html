<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PUC Insider - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="modal">
    <div class="modal-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <span>PUC Insider</span>
    </div>

    <div class="modal-body">
      <h2>Sign up</h2>
      <p>Enter your university email to continue.</p>

      <div class="input-group">
        <input type="email" id="email" placeholder="Enter university email" autocomplete="off">
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Password">
      </div>

      <button class="primary-btn" id="signupBtn">Sign Up</button>
      
      <div class="secondary-actions">
        <button class="text-btn" id="loginBtn">Login</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
